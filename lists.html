<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>القوائم | المدرسة القرآنية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --deep-green: #0b3b1e; --royal-green: #135c32; --gold: #c9a84c; --gold-pale: #f2e6c9; --sand: #f5ead0; --terracotta: #c17a3e; --cream: #fcf9f2; --text-dark: #1a2e1a; --text-muted: #4a5b4a; --radius-lg: 1.2rem; --shadow-gold: 0 20px 40px rgba(201, 168, 76, 0.2); }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(180deg, #fdf9f0 0%, #f5ead0 100%); color: var(--text-dark); padding: 20px; max-width: 850px; margin: auto; }
        h1 { color: var(--deep-green); text-align: center; margin-bottom: 20px; font-size: 2rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .tab { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 2px solid var(--gold); padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab.active { background: var(--deep-green); color: white; border-color: var(--deep-green); }
        .tab:hover { background: var(--gold-pale); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section { background: rgba(255,255,255,0.8); backdrop-filter: blur(25px); border-radius: var(--radius-lg); padding: 25px; box-shadow: var(--shadow-gold); border: 1px solid rgba(255,255,255,0.6); margin-bottom: 30px; }
        .section h2 { color: var(--deep-green); margin-bottom: 15px; font-size: 1.4rem; border-bottom: 2px solid var(--gold-pale); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background: var(--deep-green); color: white; padding: 10px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
        .btn-export { background: var(--gold); color: #0a2a0a; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; margin-bottom: 15px; transition: 0.3s; }
        .btn-export:hover { background: #b8933c; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--royal-green); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <h1>📋 القوائم الإدارية</h1>
    <div class="tabs">
        <div class="tab active" onclick="showTab('teachers')">👨‍🏫 الأساتذة</div>
        <div class="tab" onclick="showTab('parents')">👨‍👩‍👧 الأولياء</div>
        <div class="tab" onclick="showTab('boys')">👦 الطلاب الذكور</div>
        <div class="tab" onclick="showTab('girls')">👧 الطالبات الإناث</div>
    </div>

    <div id="tab-teachers" class="tab-content active">
        <div class="section"><h2>👨‍🏫 قائمة الأساتذة</h2><button class="btn-export" onclick="exportTableToCSV('teachersTable','الاساتذة.csv')">📥 تصدير CSV</button>
            <table id="teachersTable"><thead><tr><th>الاسم</th><th>اسم المستخدم</th><th>الحلقة</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div id="tab-parents" class="tab-content">
        <div class="section"><h2>👨‍👩‍👧 قائمة أولياء الأمور</h2><button class="btn-export" onclick="exportTableToCSV('parentsTable','الاولياء.csv')">📥 تصدير CSV</button>
            <table id="parentsTable"><thead><tr><th>الاسم</th><th>الهاتف</th><th>عدد الأبناء</th><th>تاريخ التسجيل</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div id="tab-boys" class="tab-content">
        <div class="section"><h2>👦 الطلاب الذكور (حسب المستوى)</h2><button class="btn-export" onclick="exportTableToCSV('boysTable','الذكور.csv')">📥 تصدير CSV</button>
            <div id="boysTablesContainer"></div></div>
    </div>
    <div id="tab-girls" class="tab-content">
        <div class="section"><h2>👧 الطالبات الإناث (حسب المستوى)</h2><button class="btn-export" onclick="exportTableToCSV('girlsTable','الاناث.csv')">📥 تصدير CSV</button>
            <div id="girlsTablesContainer"></div></div>
    </div>

    <a href="admin.html" class="back-link">⬅ العودة للوحة التحكم</a>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const idx = tabId === 'teachers' ? 1 : tabId === 'parents' ? 2 : tabId === 'boys' ? 3 : 4;
            document.querySelector(`.tab:nth-child(${idx})`).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            if (tabId === 'teachers') loadTeachers();
            if (tabId === 'parents') loadParents();
            if (tabId === 'boys') loadStudentsByGender('ذكر', 'boysTablesContainer');
            if (tabId === 'girls') loadStudentsByGender('أنثى', 'girlsTablesContainer');
        }
        function loadTeachers() {
            const teachers = (JSON.parse(localStorage.getItem('registeredUsers')) || []).filter(u => u.role === 'أستاذ');
            const tbody = document.querySelector('#teachersTable tbody');
            tbody.innerHTML = teachers.length ? '' : '<tr><td colspan="3" style="text-align:center; color:#999;">لا يوجد.</td></tr>';
            teachers.forEach(t => {
                const h = t.assignedHalaqa === 'morningProgress' ? '☀️ صباح' : t.assignedHalaqa === 'eveningProgress' ? '🌙 مساء' : '🎙️ تسميع';
                tbody.innerHTML += `<tr><td>${t.surname} ${t.name}</td><td>${t.username||'-'}</td><td>${h}</td></tr>`;
            });
        }
        function loadParents() {
            const requests = JSON.parse(localStorage.getItem('registrationRequests')) || [];
            const parentsMap = {};
            requests.forEach(r => { if(r.type==='platform' && r.role==='ولي') { const key = r.phone||r.surname+r.name; if(!parentsMap[key]) parentsMap[key] = {...r, childrenCount:0}; } if(r.type==='parent_request' && r.phone && parentsMap[r.phone]) parentsMap[r.phone].childrenCount++; });
            const parents = Object.values(parentsMap);
            const tbody = document.querySelector('#parentsTable tbody');
            tbody.innerHTML = parents.length ? '' : '<tr><td colspan="4" style="text-align:center; color:#999;">لا يوجد.</td></tr>';
            parents.forEach(p => tbody.innerHTML += `<tr><td>${p.surname} ${p.name}</td><td>${p.phone}</td><td>${p.childrenCount}</td><td>${p.date||'-'}</td></tr>`);
        }
        function loadStudentsByGender(gender, containerId) {
            const all = [];
            ['morningProgress', 'eveningProgress', 'tajweedProgress'].forEach(key => {
                (JSON.parse(localStorage.getItem(key)) || []).forEach(s => all.push({...s, halaqaKey: key}));
            });
            const filtered = all.filter(s => s.gender === gender);
            const container = document.getElementById(containerId);
            if (!filtered.length) { container.innerHTML = '<p style="color:#999; text-align:center;">لا يوجد.</p>'; return; }
            const levels = ['تحضيري', 'ابتدائي', 'متوسط', 'ثانوي'];
            let html = '';
            levels.forEach(level => {
                const levelS = filtered.filter(s => s.year === level || s.level === level);
                if (levelS.length) {
                    html += `<h3 style="margin-top:20px;">📌 ${level} (${levelS.length})</h3><table><thead><tr><th>اللقب</th><th>الاسم</th><th>العمر</th><th>الحلقة</th></tr></thead><tbody>`;
                    levelS.forEach(s => {
                        const hn = s.halaqaKey === 'morningProgress' ? '☀️ صباح' : s.halaqaKey === 'eveningProgress' ? '🌙 مساء' : '🎙️ تسميع';
                        html += `<tr><td>${s.surname||'-'}</td><td>${s.name||'-'}</td><td>${s.age||'-'}</td><td>${hn}</td></tr>`;
                    });
                    html += '</tbody></table>';
                }
            });
            container.innerHTML = html;
        }
        function exportTableToCSV(tableId, filename) {
            let csv = '';
            let table = document.getElementById(tableId);
            if (!table) {
                const container = document.getElementById(tableId + 'sContainer');
                if (container) {
                    container.querySelectorAll('table').forEach(tbl => {
                        tbl.querySelectorAll('tr').forEach(row => {
                            const cols = []; row.querySelectorAll('th, td').forEach(c => cols.push('"' + c.innerText + '"'));
                            csv += cols.join(',') + '\n';
                        });
                        csv += '\n';
                    });
                }
            } else {
                table.querySelectorAll('tr').forEach(row => {
                    const cols = []; row.querySelectorAll('th, td').forEach(c => cols.push('"' + c.innerText + '"'));
                    csv += cols.join(',') + '\n';
                });
            }
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
        loadTeachers();
    </script>
</body>
</html>
